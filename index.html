<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score Keeper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Score Keeper</h1>
    <div class="teams">
      <section id="team-a" class="team-card">
        <div class="confetti-layer" aria-hidden="true"></div>
        <h2>Unicorns 🦄</h2>
        <div id="team-a-score" class="score">0</div>
        <div class="controls">
          <button id="team-a-increment" type="button">Increment</button>
          <button id="team-a-decrement" type="button">Decrement</button>
        </div>
      </section>

      <section id="team-b" class="team-card">
        <div class="confetti-layer" aria-hidden="true"></div>
        <h2>Bats 🦇</h2>
        <div id="team-b-score" class="score">0</div>
        <div class="controls">
          <button id="team-b-increment" type="button">Increment</button>
          <button id="team-b-decrement" type="button">Decrement</button>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
