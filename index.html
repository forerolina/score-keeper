<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score Keeper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Score Keeper</h1>
    <main class="app-layout">
      <section class="aggregate-summary" aria-labelledby="aggregate-summary-title">
        <header class="aggregate-summary-header">
          <h2 id="aggregate-summary-title" class="aggregate-summary-title">Overall</h2>
        </header>
        <p id="aggregate-summary-lead" class="aggregate-summary-lead" aria-live="polite">
          No matches yet.
        </p>
      </section>

      <section class="current-match" aria-labelledby="current-match-title">
        <header class="current-match-header">
          <h2 id="current-match-title" class="current-match-title">No ongoing match</h2>
          <div class="current-match-toolbar">
            <button
              id="start-or-reset"
              type="button"
              class="toolbar-button toolbar-button-primary"
              aria-label="Start a new match"
            >
              Start
            </button>
            <button
              id="finish-match"
              type="button"
              class="toolbar-button toolbar-button-finish"
              aria-label="Mark match as finished and save it to past matches"
              disabled
            >
              Finish
            </button>
          </div>
        </header>
        <div class="teams">
          <section id="team-a" class="team-card">
            <div class="confetti-layer" aria-hidden="true"></div>
            <div class="team-card-top">
              <h2 class="team-name-heading">
                <label class="visually-hidden" for="team-a-name">Team A name</label>
                <input
                  id="team-a-name"
                  class="team-name-input"
                  type="text"
                  maxlength="48"
                  autocomplete="off"
                  value="Unicorns 🦄"
                />
              </h2>
              <div id="team-a-score" class="score">0</div>
            </div>
            <div class="controls">
              <button id="team-a-decrement" type="button">-</button>
              <button id="team-a-increment" type="button">+</button>
            </div>
          </section>

          <section id="team-b" class="team-card">
            <div class="confetti-layer" aria-hidden="true"></div>
            <div class="team-card-top">
              <h2 class="team-name-heading">
                <label class="visually-hidden" for="team-b-name">Team B name</label>
                <input
                  id="team-b-name"
                  class="team-name-input"
                  type="text"
                  maxlength="48"
                  autocomplete="off"
                  value="Bats 🦇"
                />
              </h2>
              <div id="team-b-score" class="score">0</div>
            </div>
            <div class="controls">
              <button id="team-b-decrement" type="button">-</button>
              <button id="team-b-increment" type="button">+</button>
            </div>
          </section>
        </div>
      </section>

      <section class="match-history" aria-labelledby="match-history-title">
        <header class="match-history-header">
          <h2 id="match-history-title" class="match-history-title">Past matches</h2>
          <button
            id="clear-match-history"
            type="button"
            class="toolbar-button toolbar-button-secondary match-history-clear"
            aria-label="Clear all completed matches"
            disabled
          >
            Clear all
          </button>
        </header>
        <p id="match-history-empty" class="match-history-empty">No completed matches yet.</p>
        <ol id="match-history-list" class="match-history-list" hidden></ol>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
