<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Score Keeper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Score Keeper</h1>
    <div class="teams">
      <section id="team-a" class="team-card">
        <div class="confetti-layer" aria-hidden="true"></div>
        <h2 class="team-name-heading">
          <label class="visually-hidden" for="team-a-name">Team A name</label>
          <input
            id="team-a-name"
            class="team-name-input"
            type="text"
            maxlength="48"
            autocomplete="off"
            value="Unicorns 🦄"
          />
        </h2>
        <div id="team-a-score" class="score">0</div>
        <div class="controls">
          <button id="team-a-decrement" type="button">-</button>
          <button id="team-a-increment" type="button">+</button>
        </div>
      </section>

      <div class="reset-slot">
        <button id="reset-scores" type="button">Reset</button>
      </div>

      <section id="team-b" class="team-card">
        <div class="confetti-layer" aria-hidden="true"></div>
        <h2 class="team-name-heading">
          <label class="visually-hidden" for="team-b-name">Team B name</label>
          <input
            id="team-b-name"
            class="team-name-input"
            type="text"
            maxlength="48"
            autocomplete="off"
            value="Bats 🦇"
          />
        </h2>
        <div id="team-b-score" class="score">0</div>
        <div class="controls">
          <button id="team-b-decrement" type="button">-</button>
          <button id="team-b-increment" type="button">+</button>
        </div>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
